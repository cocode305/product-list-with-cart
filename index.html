<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">

  <!-- FontAwesome Icons -->
  <script src="https://kit.fontawesome.com/6f18932376.js" crossorigin="anonymous"></script>
  
  <title>Frontend Mentor | Product list with cart</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <div class="container">
    
    <section>
      <div class="product-section">
        <div id="product-list">
          <h1 class="section-title">Desserts</h1>
          <div class="product-container">
            
          </div>
    
        </div>
    
        <div class="cart">
          <h1 class="cart-heading">Your Cart <span class="cart-quanntity">(0)</span></h1>
          <div class="empty-cart">
            <img src="assets/images/illustration-empty-cart.svg" alt="Empty cart image">
            <p>Your added items will appear here</p>
          </div>

          <div class="cart-container"></div>
        </div>
      </div>
    </section>
  </div>

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </div>

  <script src="js/script.js"></script>
</body>
</html>
