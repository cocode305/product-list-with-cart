<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">

  <!-- FontAwesome Icons -->
  <script src="https://kit.fontawesome.com/6f18932376.js" crossorigin="anonymous"></script>
  
  <title>Frontend Mentor | Product list with cart</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <div class="container">
    
    <section>
      <div class="product-section">
        <div id="product-list">
          <h1 class="section-title">Desserts</h1>
          <div class="product-container">
            
          </div>
    
        </div>
    
        <div class="cart">
          <h1 class="cart-heading">Your Cart <span class="cart-quantity">(0)</span></h1>
          <div class="empty-cart hidden">
            <img src="assets/images/illustration-empty-cart.svg" alt="Empty cart image">
            <p>Your added items will appear here</p>
          </div>

          <ul class="cart-list">
            <li class="cart-item">
              <div class="cart-item-details">
                <h4 class="product-name">waffle with Berries</h4>
                <div class="product-cost">
                  <span class="item-quantity">4x</span>
                  <span class="item-price">$6.50</span>
                  <span class="item-total">$26.00</span>
                </div>
              </div>
              
              <button class="cancel-order-btn" onclick="cancelOrder()">
                <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" fill="none" viewBox="0 0 10 10">
                  <path fill="#CAAFA7"
                  d="M8.375 9.375 5 6 1.625 9.375l-1-1L4 5 .625 1.625l1-1L5 4 8.375.625l1 1L6 5l3.375 3.375-1 1Z" />
                </svg>
              </button>
            </li>

            <li class="cart-item">
              <div class="cart-item-details">
                <h4 class="product-name">waffle with Berries</h4>
                <div class="product-cost">
                  <span class="item-quantity">4x</span>
                  <span class="item-price">$6.50</span>
                  <span class="item-total">$26.00</span>
                </div>
              </div>
              
              <button class="cancel-order-btn" onclick="cancelOrder()">
                <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" fill="none" viewBox="0 0 10 10">
                  <path fill="#CAAFA7"
                  d="M8.375 9.375 5 6 1.625 9.375l-1-1L4 5 .625 1.625l1-1L5 4 8.375.625l1 1L6 5l3.375 3.375-1 1Z" />
                </svg>
              </button>
            </li>

            <li class="cart-item">
              <div class="cart-item-details">
                <h4 class="product-name">waffle with Berries</h4>
                <div class="product-cost">
                  <span class="item-quantity">4x</span>
                  <span class="item-price">$6.50</span>
                  <span class="item-total">$26.00</span>
                </div>
              </div>
              
              <button class="cancel-order-btn" onclick="cancelOrder()">
                <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" fill="none" viewBox="0 0 10 10">
                  <path fill="#CAAFA7"
                  d="M8.375 9.375 5 6 1.625 9.375l-1-1L4 5 .625 1.625l1-1L5 4 8.375.625l1 1L6 5l3.375 3.375-1 1Z" />
                </svg>
              </button>
            </li>
          </ul>
        </div>
      </div>
    </section>
  </div>

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </div>

  <script src="js/script.js"></script>
</body>
</html>
